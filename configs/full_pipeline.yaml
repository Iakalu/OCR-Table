preprocess:
  max_side: 1800
  deskew: true
  denoise: true
  # tuned for screenshot-like tables (colored cells, small text)
  contrast: 1.35
  sharpness: 1.6

detection:
  backend: table_transformer
  model_name: microsoft/table-transformer-detection
  # lower threshold helps avoid missing the table region in screenshots
  confidence_threshold: 0.45
  nms_iou: 0.50
  image_size: 1333

structure:
  backend: table_transformer
  model_name: microsoft/table-transformer-structure-recognition
  checkpoint_path: checkpoints/structure_line_cnn.pt
  line_threshold: 0.45
  line_projection_threshold: 0.08
  structure_threshold: 0.65
  merge_tolerance: 10
  min_cell_width: 18
  min_cell_height: 12
  max_rows: 120
  max_cols: 80

ocr:
  backend: auto
  # Vietnamese helps names/diacritics in schedules/tables
  lang: vi
  trocr_model_name: microsoft/trocr-base-printed
  confidence_threshold: 0.50
  cell_padding: 4
  # Passed into PaddleOCR(...) when backend is paddleocr/auto and paddle is available
  paddle_kwargs:
    use_space_char: true
    det_db_box_thresh: 0.45
    det_db_unclip_ratio: 1.8
  preprocess:
    denoise: true
    autocontrast_cutoff: 1
    contrast: 1.45
    sharpness: 1.8
    # For colored screenshot tables, binarize can drop Vietnamese diacritics.
    # If times/OFF/PH are still noisy, try:
    #   binarize: true
    #   binarize_percentile: 58-65
    binarize: false

output:
  formats: [html, csv, json]
# Optional preset retained from the former configs/excel_screenshot.yaml.
# It is documented here instead of kept as a separate runtime config.
# To use these settings, copy the preset values into the top-level sections above.
presets:
  excel_screenshot:
    preprocess:
      max_side: 1600
      deskew: false
      denoise: false
      contrast: 1.0
      sharpness: 1.0

    detection:
      backend: heuristic
      model_name: microsoft/table-transformer-detection
      confidence_threshold: 0.55
      nms_iou: 0.50
      image_size: 1024

    structure:
      backend: heuristic
      model_name: microsoft/table-transformer-structure-recognition
      checkpoint_path: checkpoints/structure_line_cnn.pt
      line_threshold: 0.45
      line_projection_threshold: 0.08
      structure_threshold: 0.50
      merge_tolerance: 8
      min_cell_width: 20
      min_cell_height: 12
      max_rows: 80
      max_cols: 40

    ocr:
      backend: paddleocr
      lang: en
      trocr_model_name: microsoft/trocr-base-printed
      confidence_threshold: 0.50
      cell_padding: 3
      preprocess:
        denoise: false
        autocontrast_cutoff: 0
        contrast: 1.0
        sharpness: 1.0
        binarize: false

    output:
      formats: [html, csv, json]
