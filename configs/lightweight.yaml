preprocess:
  max_side: 1600
  deskew: true
  denoise: false
  autocontrast: false
  contrast: 1.0
  sharpness: 1.0

detection:
  backend: heuristic
  model_name: microsoft/table-transformer-detection
  confidence_threshold: 0.55
  nms_iou: 0.50
  image_size: 1024

structure:
  backend: heuristic
  model_name: microsoft/table-transformer-structure-recognition
  checkpoint_path: checkpoints/structure_line_cnn.pt
  line_threshold: 0.45
  line_projection_threshold: 0.08
  structure_threshold: 0.50
  merge_tolerance: 8
  min_cell_width: 24
  min_cell_height: 16
  max_rows: 80
  max_cols: 40

ocr:
  backend: paddleocr
  lang: en
  trocr_model_name: microsoft/trocr-base-printed
  confidence_threshold: 0.50
  cell_padding: 3
  per_cell_fallback: false
  enable_trocr_fallback: false

output:
  formats: [html, csv, json]
